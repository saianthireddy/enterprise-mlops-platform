name: Automated retraining

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}     # manual trigger

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    outputs:
      drifted: ${{ steps.drift.outputs.drifted }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check for data drift
        id: drift
        run: |
          if python scripts/check_drift.py --shift 0.0; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

  retrain:
    needs: drift-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train challenger and evaluate promotion
        run: python scripts/train.py --model gradient_boosting
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-registry
          path: artifacts/registry/
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST -H 'Content-Type: application/json' \
              -d '{"text":"Retraining run finished for enterprise-mlops-platform (${{ job.status }})."}' \
              "$SLACK_WEBHOOK_URL"
          fi
